<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>글자 친구</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Jua', sans-serif;
            background-color: #FFF9E6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 230, 240, 0.5) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(220, 240, 255, 0.5) 0%, transparent 20%);
        }
 
        html { height: -webkit-fill-available; }
 
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        .screen.active { display: flex; }
 
        h1.app-title {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            color: #FF8FAB;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #FFF;
        }
        p.guide-text {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #555;
            margin-bottom: 30px;
        }
 
        .mic-btn {
            width: clamp(120px, 40vw, 180px);
            height: clamp(120px, 40vw, 180px);
            border-radius: 50%;
            background-color: #FFD166;
            border: 8px solid #FFF;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-size: clamp(3rem, 10vw, 5rem);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .mic-btn.recording {
            background-color: #4D96FF;
            color: white;
            animation: pulseRipple 1.5s infinite;
        }
        
        .action-btn {
            background-color: #FFF;
            border: 4px solid #FFD166;
            border-radius: 30px;
            padding: 15px 25px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-family: 'Jua', sans-serif;
            color: #333;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.positive {
            background-color: #6BCB77;
            border-color: #6BCB77;
            color: white;
        }
        .action-btn.retry {
            background-color: #FFB3C6;
            border-color: #FFB3C6;
            color: white;
        }
 
        /* ── 글자 표시 영역: 더 크게 ── */
        .word-display {
            background-color: #FFF;
            border-radius: 35px;
            padding: 50px 40px;
            width: 100%;
            max-width: 700px;
            min-height: 200px;
            box-sizing: border-box;
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
            margin-bottom: 16px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        
        .word-display .text-content {
            color: #333;
            margin: 0;
            padding: 0;
        }
        /* ── 10자 이하: 한 줄 고정 ── */
        .text-content.short-text {
            font-size: clamp(4rem, 14vw, 8rem);
            line-height: 1.2;
            white-space: nowrap;
        }
        .text-content.long-text {
            font-size: clamp(2.2rem, 9vw, 4.5rem);
            line-height: 1.6;
            white-space: normal;
        }
 
        .deco-icon {
            position: absolute;
            font-size: clamp(1.5rem, 6vw, 3rem);
        }
        .deco-1 { top: -15px; left: -15px; transform: rotate(-15deg); }
        .deco-2 { bottom: -15px; right: -15px; transform: rotate(15deg); }
 
        .speaker-btn {
            background-color: #4D96FF;
            color: white;
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            margin: 10px auto 20px auto;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .speaker-btn:active { transform: scale(0.9); }
 
        #toast-msg {
            position: fixed;
            bottom: 30px;
            background-color: rgba(0,0,0,0.8);
            color: #FFF;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: clamp(1rem, 4vw, 1.5rem);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
            max-width: 80%;
            text-align: center;
        }
        #toast-msg.show { opacity: 1; }
 
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseRipple {
            0% { box-shadow: 0 0 0 0 rgba(77, 150, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(77, 150, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(77, 150, 255, 0); }
        }
 
        .browser-warning {
            font-size: 1rem;
            color: #ff6b6b;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
 
    <div id="toast-msg"></div>
 
    <!-- 1. 첫 화면 -->
    <div id="home-screen" class="screen active">
        <h1 class="app-title">글자 친구</h1>
        <p class="guide-text">쓰고 싶은 말을 해 볼까요?</p>
        <button id="mic-start-btn" class="mic-btn">🎤</button>
        <p class="guide-text" style="font-size: clamp(1rem, 4vw, 1.5rem); color: #888;">마이크를 누르고 말해요</p>
        <p id="browser-warning" class="browser-warning">⚠️ 현재 브라우저에서는 마이크를 사용할 수 없어요. 안드로이드 크롬(Chrome)이나 아이폰 사파리(Safari)를 이용해주세요.</p>
    </div>
 
    <!-- 2. 글자 확인 화면 ("이 글자가 맞나요?" 제거) -->
    <div id="confirm-screen" class="screen">
        <div class="word-display">
            <p id="confirm-text" class="text-content short-text"></p>
        </div>
        
        <button class="speaker-btn" onclick="speakText()">🔊</button>
        
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; width: 100%;">
            <button class="action-btn positive" onclick="goTraceScreen()">✨ 맞아요</button>
            <button class="action-btn retry" onclick="retrySpeaking()">💬 다시 말할래요</button>
        </div>
    </div>
 
    <!-- 3. 따라 쓰기 화면 -->
    <div id="trace-screen" class="screen">
        <p class="guide-text">보고 써 보세요</p>
        <div class="word-display">
            <span class="deco-icon deco-1">✏️</span>
            <span class="deco-icon deco-2">⭐</span>
            <p id="trace-text" class="text-content short-text"></p>
        </div>
        
        <button class="speaker-btn" onclick="speakText()">🔊</button>
        
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
            <button class="action-btn" onclick="retrySpeaking()">🎤 다시 말하기</button>
        </div>
    </div>
 
    <script>
        let currentRecognizedText = "";
        let isTtsInitialized = false;
        let voicesReady = false;
        let koVoice = null;
 
        /* ─────────────────────────────────────────────
           TTS 음성 목록 로딩 (S7 등 구형 안드로이드 핵심)
           getVoices() 가 처음에는 빈 배열을 반환 → 
           onvoiceschanged 이벤트에서 실제 목록을 받음
        ───────────────────────────────────────────── */
        function loadVoices() {
            if (!window.speechSynthesis) return;
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                koVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ko'))
                       || voices.find(v => v.lang && v.lang.toLowerCase().includes('kr'))
                       || null;
                voicesReady = true;
                console.log('TTS voices loaded:', voices.length, 'Korean voice:', koVoice ? koVoice.name : 'default');
            }
        }
 
        if (window.speechSynthesis) {
            loadVoices();
            window.speechSynthesis.onvoiceschanged = loadVoices;
            // 일부 기기는 onvoiceschanged 가 안 떠서 폴링으로 백업
            let voicePollCount = 0;
            const voicePoll = setInterval(() => {
                loadVoices();
                voicePollCount++;
                if (voicesReady || voicePollCount > 20) clearInterval(voicePoll);
            }, 250);
        }
 
        /* ─────────────────────────────────────────────
           오디오 잠금 해제 (구형 안드로이드 필수)
           - volume=0 묵음이 아닌 실제 짧은 발화로 워밍업
           - 첫 사용자 터치 시 1회만 실행
        ───────────────────────────────────────────── */
        function unlockAudio() {
            if (isTtsInitialized || !window.speechSynthesis) return;
            try {
                window.speechSynthesis.cancel();
                // 진짜 짧은 텍스트로 엔진 깨움 (S7 에서 volume=0 무시되는 경우 있음)
                const u = new SpeechSynthesisUtterance('.');
                u.lang = 'ko-KR';
                u.volume = 0.01;
                u.rate = 10;
                window.speechSynthesis.speak(u);
                isTtsInitialized = true;
                
                document.removeEventListener('touchstart', unlockAudio);
                document.removeEventListener('click', unlockAudio);
            } catch(e) {
                console.warn('TTS unlock failed:', e);
            }
        }
        document.addEventListener('touchstart', unlockAudio, { passive: true });
        document.addEventListener('click', unlockAudio);
 
        /* ─────────────────────────────────────────────
           음성 인식
        ───────────────────────────────────────────── */
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
 
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
 
            recognition.onstart = function() {
                const micBtn = document.getElementById('mic-start-btn');
                micBtn.classList.add('recording');
                micBtn.innerHTML = '🎙️';
            };
 
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.trim();
                if (transcript) {
                    currentRecognizedText = transcript;
                    showConfirmScreen();
                } else {
                    showToast("잘 듣지 못했어요. 다시 말해 볼까요?");
                }
            };
 
            recognition.onend = function() {
                const micBtn = document.getElementById('mic-start-btn');
                micBtn.classList.remove('recording');
                micBtn.innerHTML = '🎤';
            };
 
            recognition.onerror = function(event) {
                console.error("Speech recognition error:", event.error);
                const micBtn = document.getElementById('mic-start-btn');
                micBtn.classList.remove('recording');
                micBtn.innerHTML = '🎤';
                
                if (event.error === 'not-allowed') {
                    showToast("마이크 권한을 허용해 주세요.");
                } else if (event.error === 'no-speech') {
                    showToast("말소리가 들리지 않았어요.");
                } else if (event.error !== 'aborted') {
                    showToast("잘 듣지 못했어요. 다시 말해 볼까요?");
                }
            };
        } else {
            document.getElementById('browser-warning').style.display = 'block';
            document.getElementById('mic-start-btn').style.opacity = '0.5';
        }
 
        function goScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
 
        function showConfirmScreen() {
            const el = document.getElementById('confirm-text');
            el.innerText = currentRecognizedText;
            adjustTextSize(el, currentRecognizedText);
            goScreen('confirm-screen');
            speakText(currentRecognizedText);
        }
 
        function goTraceScreen() {
            const el = document.getElementById('trace-text');
            el.innerText = currentRecognizedText;
            adjustTextSize(el, currentRecognizedText);
            goScreen('trace-screen');
        }
 
        function retrySpeaking() {
            goScreen('home-screen');
            showToast("다시 한 번 말해 볼까요?");
        }
 
        function adjustTextSize(element, text) {
            if (text.length <= 10) {
                element.classList.remove('long-text');
                element.classList.add('short-text');
            } else {
                element.classList.remove('short-text');
                element.classList.add('long-text');
            }
        }
 
        document.getElementById('mic-start-btn').addEventListener('click', () => {
            if (recognition) {
                try { recognition.start(); }
                catch(e) { console.log("이미 인식 중입니다."); }
            } else {
                showToast("현재 브라우저에서는 사용할 수 없어요.");
            }
        });
 
        /* ─────────────────────────────────────────────
           ⭐ TTS 실행 (S7 호환 강화 핵심) ⭐
           1) cancel() 후 즉시 speak() 하면 안드로이드에서 씹힘
              → 짧은 setTimeout 으로 큐 분리
           2) voices 가 아직 로딩 안 됐으면 로드되길 기다림
           3) onstart 이 일정 시간 안에 안 오면 1회 재시도
           4) 14초 끊김 버그 → pause/resume 패치
        ───────────────────────────────────────────── */
        function speakText(textToSpeak) {
            if (!window.speechSynthesis) return;
            if (textToSpeak === undefined) textToSpeak = currentRecognizedText;
            if (!textToSpeak) return;
 
            // voices 가 아직 안 들어왔다면 잠깐 기다려보기
            if (!voicesReady) loadVoices();
 
            doSpeak(textToSpeak, 0);
        }
 
        function doSpeak(text, attempt) {
            try { window.speechSynthesis.cancel(); } catch(e) {}
 
            // ⭐ S7 핵심: cancel 직후 speak 하면 무음 → 100ms 딜레이
            setTimeout(() => {
                try {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang   = 'ko-KR';
                    u.rate   = 0.8;
                    u.pitch  = 1.2;
                    u.volume = 1.0;
                    if (koVoice) u.voice = koVoice;
 
                    let started = false;
 
                    u.onstart = () => {
                        started = true;
                        // 일부 안드로이드는 시작 직후 일시정지 상태 → 강제 재개
                        try { window.speechSynthesis.resume(); } catch(e) {}
                        androidResumePatch();
                    };
                    u.onend   = () => clearInterval(window._resumeTimer);
                    u.onerror = (e) => {
                        clearInterval(window._resumeTimer);
                        console.warn('TTS error:', e.error);
                    };
 
                    window.speechSynthesis.speak(u);
 
                    // 강제 resume (Android Chrome 의 paused 상태 진입 버그)
                    try { window.speechSynthesis.resume(); } catch(e) {}
 
                    // ⭐ 700ms 안에 onstart 가 안 오면 1회 재시도
                    setTimeout(() => {
                        if (!started && attempt < 1) {
                            console.log('TTS not started, retrying...');
                            doSpeak(text, attempt + 1);
                        }
                    }, 700);
 
                } catch(e) {
                    console.warn('speak failed:', e);
                }
            }, 100);
        }
 
        // Android Chrome 14초 끊김 버그 우회
        function androidResumePatch() {
            clearInterval(window._resumeTimer);
            window._resumeTimer = setInterval(() => {
                if (!window.speechSynthesis.speaking) {
                    clearInterval(window._resumeTimer);
                    return;
                }
                try {
                    window.speechSynthesis.pause();
                    window.speechSynthesis.resume();
                } catch(e) {}
            }, 10000);
        }
 
        function showToast(message) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
