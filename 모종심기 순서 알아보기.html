<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초록꿈터 모종 심기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap');

        body {
            font-family: 'Gaegu', cursive;
            background-color: #f0fdf4;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .garden-bg {
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #8d6e63 50%, #8d6e63 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card-slot {
            border: 4px dashed #cbd5e1;
            transition: all 0.3s;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
        }

        .card-slot.active {
            border-color: #4ade80;
            background-color: rgba(74, 222, 128, 0.2);
            transform: scale(1.05);
        }

        .draggable-card {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 50;
            user-select: none;
            touch-action: none;
            flex-shrink: 0;
        }

        .draggable-card:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        @keyframes fly {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: fly 1s forwards;
            font-size: 2.5rem;
            z-index: 100;
        }

        .scale-up {
            animation: scaleUp 0.5s ease-out forwards;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 이미지 가득 채우기 스타일 */
        .full-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 칸에 꽉 차도록 설정 */
        }
    </style>
</head>
<body class="select-none">

    <!-- 시작 화면 -->
    <div id="start-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-[#f0fdf4] text-center p-4">
        <div class="bg-white p-10 rounded-3xl shadow-xl border-8 border-green-200 max-w-lg w-full scale-up">
            <h1 class="text-5xl font-bold text-green-600 mb-6">초록꿈터에<br>모종을 심어볼까요?</h1>
            <div class="mb-8 text-9xl">🌱</div>
            <button onclick="startGame()" class="bg-orange-400 hover:bg-orange-500 text-white text-3xl px-12 py-4 rounded-full shadow-lg transform transition active:scale-95">
                시작하기!
            </button>
        </div>
    </div>

    <!-- 메인 게임 화면 -->
    <div id="game-screen" class="hidden garden-bg">
        <div class="bg-white/90 p-4 text-center shadow-md z-20">
            <p id="instruction-text" class="text-3xl font-bold text-green-700">그림을 순서대로 빈칸에 놓아주세요!</p>
        </div>

        <div class="flex-grow flex flex-col items-center justify-start py-4 px-2 overflow-hidden">
            <div class="flex flex-wrap justify-center gap-2 sm:gap-4 mb-6 z-10">
                <div class="card-slot w-20 h-20 sm:w-28 sm:h-28 text-gray-300 text-3xl font-bold" data-index="1">1</div>
                <div class="card-slot w-20 h-20 sm:w-28 sm:h-28 text-gray-300 text-3xl font-bold" data-index="2">2</div>
                <div class="card-slot w-20 h-20 sm:w-28 sm:h-28 text-gray-300 text-3xl font-bold" data-index="3">3</div>
                <div class="card-slot w-20 h-20 sm:w-28 sm:h-28 text-gray-300 text-3xl font-bold" data-index="4">4</div>
            </div>

            <div id="garden-visual" class="relative w-full h-40 flex items-end justify-center">
                <div id="hole" class="absolute bottom-2 w-32 h-10 bg-black/20 rounded-[100%] hidden"></div>
                <div id="plant" class="absolute bottom-6 w-24 h-32 hidden transform translate-y-10 opacity-0 transition-all duration-500">
                    <svg viewBox="0 0 100 120">
                        <path d="M50,110 L50,60" stroke="#4caf50" stroke-width="6" />
                        <path d="M50,80 Q70,60 90,80 Q70,100 50,80" fill="#8bc34a" />
                        <path d="M50,80 Q30,60 10,80 Q30,100 50,80" fill="#8bc34a" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="w-full bg-white/80 p-6 border-t-4 border-white rounded-t-[3rem] shadow-2xl z-30">
            <div id="card-container" class="flex flex-wrap justify-center items-center gap-4">
                <div class="draggable-card w-24 h-28 sm:w-32 sm:h-36 bg-white rounded-2xl shadow-lg border-2 border-green-100 flex flex-col items-center justify-center p-2 text-center" draggable="true" data-step="1">
                    <span class="text-5xl mb-2">⛏️</span>
                    <p class="text-xl font-bold text-gray-700">구멍 파기</p>
                </div>
                <div class="draggable-card w-24 h-28 sm:w-32 sm:h-36 bg-white rounded-2xl shadow-lg border-2 border-green-100 flex flex-col items-center justify-center p-2 text-center" draggable="true" data-step="2">
                    <span class="text-5xl mb-2">🌱</span>
                    <p class="text-xl font-bold text-gray-700">모종 넣기</p>
                </div>
                <div class="draggable-card w-24 h-28 sm:w-32 sm:h-36 bg-white rounded-2xl shadow-lg border-2 border-green-100 flex flex-col items-center justify-center p-2 text-center" draggable="true" data-step="3">
                    <span class="text-5xl mb-2">👐</span>
                    <p class="text-xl font-bold text-gray-700">흙 덮기</p>
                </div>
                <div class="draggable-card w-24 h-28 sm:w-32 sm:h-36 bg-white rounded-2xl shadow-lg border-2 border-green-100 flex flex-col items-center justify-center p-2 text-center" draggable="true" data-step="4">
                    <span class="text-5xl mb-2">❤️</span>
                    <p class="text-xl font-bold text-gray-700">사랑의 한마디</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="hidden fixed inset-0 z-[200] flex flex-col items-center justify-center bg-white/95 text-center p-2 sm:p-4">
        <div class="bg-white p-4 rounded-3xl shadow-2xl border-8 border-yellow-200 max-w-2xl w-full scale-up overflow-hidden flex flex-col items-center">
            <h2 class="text-3xl sm:text-4xl font-bold text-orange-500 mb-1">참 잘했어요!</h2>
            <p class="text-lg sm:text-xl text-green-700 mb-2 font-bold">와! 초록꿈터에 모종 심기 성공!</p>
            
            <div id="final-image-container" class="w-full h-[45vh] sm:h-[55vh] rounded-2xl bg-green-50 mb-4 flex items-center justify-center border-4 border-green-200 relative overflow-hidden shadow-inner">
                <div id="image-placeholder" class="text-green-400 flex flex-col items-center">
                    <div class="animate-pulse text-6xl">🎨</div>
                    <p>그림을 완성하고 있어요...</p>
                </div>
            </div>

            <button onclick="restartGame()" class="bg-green-500 hover:bg-green-600 text-white text-xl sm:text-2xl px-10 py-3 sm:py-4 rounded-full shadow-lg transition active:scale-95">
                한 번 더 할래요!
            </button>
        </div>
    </div>

    <div id="feedback-box" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white border-4 p-8 rounded-3xl shadow-2xl hidden z-[250] text-4xl font-bold text-center min-w-[300px]"></div>

    <script>
        const apiKey = "";
        let currentStep = 1;
        const totalSteps = 4;
        let draggedElement = null;
        let preloadedImageUrl = null; // 미리 불러온 이미지 URL

        // 이미지 생성 함수 (불필요한 글자 제거 및 퀄리티 향상)
        async function fetchGardenImage() {
            const prompt = "A lush children's storybook illustration of a vegetable garden. Neatly planted rows of green romaine, red lettuce, zucchini, cucumber, cherry tomatoes, and purple eggplants. A cute smiling sun in the blue sky. A colorful watering can sprinkling water. NO TEXT, NO LETTERS, high resolution, soft pastel colors, fill the entire frame.";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const result = await response.json();
                if (result.predictions && result.predictions[0].bytesBase64Encoded) {
                    preloadedImageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                }
            } catch (error) {
                console.error("그림 생성 중 오류:", error);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            resetGameState();
        }

        function restartGame() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('final-image-container').innerHTML = `
                <div id="image-placeholder" class="text-green-400 flex flex-col items-center">
                    <div class="animate-pulse text-6xl">🎨</div>
                    <p>그림을 완성하고 있어요...</p>
                </div>`;
            preloadedImageUrl = null;
            resetGameState();
        }

        function resetGameState() {
            currentStep = 1;
            document.getElementById('instruction-text').innerText = "그림을 순서대로 빈칸에 놓아주세요!";
            document.querySelectorAll('.card-slot').forEach(slot => {
                slot.innerHTML = slot.getAttribute('data-index');
                slot.className = "card-slot w-20 h-20 sm:w-28 sm:h-28 text-gray-300 text-3xl font-bold";
            });
            const container = document.getElementById('card-container');
            const cards = Array.from(document.querySelectorAll('.draggable-card'));
            cards.forEach(card => card.style.display = 'flex');
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                container.appendChild(cards[j]);
            }
            document.getElementById('hole').classList.add('hidden');
            document.getElementById('plant').classList.add('hidden', 'translate-y-10', 'opacity-0');
        }

        function setupInteractions() {
            document.querySelectorAll('.draggable-card').forEach(card => {
                card.addEventListener('dragstart', function() { draggedElement = this; this.style.opacity = '0.4'; });
                card.addEventListener('dragend', function() { this.style.opacity = '1'; draggedElement = null; });
                card.addEventListener('touchstart', function() { draggedElement = this; });
            });

            document.querySelectorAll('.card-slot').forEach(slot => {
                slot.addEventListener('dragover', e => e.preventDefault());
                slot.addEventListener('drop', function() { if(draggedElement) handleAction(this); });
                slot.addEventListener('click', function() { if(draggedElement) handleAction(this); });
            });
        }

        function handleAction(slot) {
            const cardStep = parseInt(draggedElement.getAttribute('data-step'));
            const slotIdx = parseInt(slot.getAttribute('data-index'));

            if (slotIdx === currentStep && cardStep === currentStep) {
                slot.innerHTML = draggedElement.innerHTML;
                slot.className = "card-slot w-20 h-20 sm:w-28 sm:h-28 bg-green-100 border-4 border-green-500 shadow-inner flex flex-col items-center justify-center p-1 text-center scale-up";
                draggedElement.style.display = 'none';
                showFeedback(true);
                updateGardenVisual(currentStep);
                
                // 3단계를 완료하면 미리 이미지 생성을 시작하여 대기 시간 단축
                if (currentStep === 3) {
                    fetchGardenImage();
                }

                currentStep++;
                
                if (currentStep > totalSteps) {
                    setTimeout(finishGame, 800);
                } else if (currentStep === 4) {
                    document.getElementById('instruction-text').innerText = "사랑의 말(사랑해, 무럭무럭 잘자라라)을 해줘요.";
                }
            } else {
                showFeedback(false);
            }
            draggedElement = null;
        }

        function updateGardenVisual(step) {
            if(step === 1) document.getElementById('hole').classList.remove('hidden');
            if(step === 2) {
                const p = document.getElementById('plant');
                p.classList.remove('hidden');
                setTimeout(() => p.classList.remove('translate-y-10', 'opacity-0'), 50);
            }
            if(step === 3) document.getElementById('hole').style.backgroundColor = '#5d4037';
        }

        function showFeedback(isSuccess) {
            const box = document.getElementById('feedback-box');
            box.innerText = isSuccess ? "맞았어요!" : "다시 해볼까요?";
            box.style.color = isSuccess ? '#16a34a' : '#dc2626';
            box.classList.remove('hidden');
            if(isSuccess) {
                for(let i=0; i<6; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle';
                    s.innerText = '✨';
                    s.style.left = (Math.random()*80+10)+'%';
                    s.style.top = (Math.random()*80+10)+'%';
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 1000);
                }
            }
            setTimeout(() => box.classList.add('hidden'), 800);
        }

        async function finishGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const container = document.getElementById('final-image-container');
            
            // 이미지가 아직 준비 안 되었으면 조금 더 기다림
            if (!preloadedImageUrl) {
                await fetchGardenImage();
            }

            if (preloadedImageUrl) {
                container.innerHTML = `<img src="${preloadedImageUrl}" class="full-img" alt="초록꿈터 텃밭 풍경">`;
            } else {
                container.innerHTML = `
                    <div class="flex flex-col items-center p-10 text-green-600">
                        <span class="text-7xl mb-4">☀️🪴💧</span>
                        <p class="text-2xl font-bold text-center">텃밭이 완성되었어요!</p>
                    </div>`;
            }
        }

        window.onload = setupInteractions;
    </script>
</body>
</html>
