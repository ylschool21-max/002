<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>같은 그림을 찾아봐!</title>
    <style>
        :root {
            --bg-color: #f0f9ff; 
            --brand-red: #ff6b6b; 
            --match-green: #4ade80;
            --accent-yellow: #ffd93d;
            --board-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d0eaff 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .deco-cloud {
            position: fixed;
            background: white;
            border-radius: 100px;
            opacity: 0.7;
            z-index: -1;
            filter: blur(2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            z-index: 10;
        }

        h1 { 
            color: var(--brand-red); 
            margin: 5px 0; 
            font-size: 2.2rem;
            text-shadow: 2px 2px 0px white;
        }
        .info-text { margin: 0; color: #666; font-weight: bold; }

        #timer-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            margin: 10px 0;
            display: none;
            background: var(--brand-red);
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
            border: 3px solid white;
            z-index: 10;
        }

        .setup-box {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 420px;
            border: 4px solid var(--accent-yellow);
            position: relative;
        }

        .timer-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0 25px;
            flex-wrap: wrap;
        }

        .timer-btn {
            background: #f8f9fa;
            border: 2px solid #eee;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .timer-btn.active {
            background: var(--accent-yellow);
            color: #333;
            border-color: var(--accent-yellow);
            transform: translateY(-3px);
            box-shadow: 0 4px 0px #e6c232;
        }

        .game-board {
            display: none;
            grid-template-columns: repeat(6, 100px); 
            grid-gap: 15px;
            perspective: 1000px;
            margin-top: 20px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            padding: 25px;
            border-radius: 40px;
            border: 5px dashed var(--accent-yellow);
            position: relative;
        }

        .board-deco {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            width: 100px;
            height: 150px;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 15px;
            position: relative;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            background-color: white;
        }

        .card-back {
            background-color: var(--accent-yellow);
            color: white;
            font-size: 2.5rem;
            background-image: radial-gradient(circle, #fff 10%, transparent 11%), 
                              linear-gradient(45deg, transparent 45%, #ffffff33 45%, #ffffff33 55%, transparent 55%);
            background-size: 20px 20px, 40px 40px;
        }

        .card-front {
            transform: rotateY(180deg);
        }

        .card-front img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 10px;
        }

        /* 화려한 파티클 스타일 */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            border-radius: 50%;
        }

        @keyframes successBounce {
            0%, 100% { transform: scale(1) rotateY(180deg); }
            50% { transform: scale(1.15) rotateY(180deg); }
        }

        .card.matched-animation .card-inner {
            animation: successBounce 0.5s ease-in-out;
        }

        .btn {
            background-color: var(--brand-red);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0px #d44d4d;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0px #d44d4d; }
        .btn:active { transform: translateY(2px); box-shadow: 0 0px 0px #d44d4d; }
        
        input[type="file"] { display: none; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 500;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 350px;
            border: 8px solid var(--accent-yellow);
        }

        @media (max-width: 700px) {
            .game-board { 
                grid-template-columns: repeat(3, 95px); 
                padding: 15px;
            }
            .card { width: 95px; height: 142px; }
        }
    </style>
</head>
<body>

    <div class="deco-cloud" style="width: 200px; height: 70px; top: 5%; left: -40px;"></div>
    <div class="deco-cloud" style="width: 120px; height: 50px; top: 15%; right: 5%;"></div>
    <div class="deco-cloud" style="width: 180px; height: 60px; bottom: 10%; left: 10%;"></div>

    <header>
        <h1>같은 그림을 찾아봐!</h1>
        <p class="info-text">시간 내에 짝꿍 그림을 모두 찾아주세요! ✨</p>
    </header>

    <div id="timer-display">03:00</div>

    <div class="setup-box" id="setup-box">
        <p style="font-size: 1.1rem; margin-top: 0;">🎮 <b>도전 시간 선택</b></p>
        <div class="timer-options">
            <button class="timer-btn active" data-time="180">3분</button>
            <button class="timer-btn" data-time="300">5분</button>
            <button class="timer-btn" data-time="600">10분</button>
        </div>
        <p style="font-size: 1.1rem;">📸 <b>그림 사진 6장 고르기</b></p>
        <label class="btn" for="file-input">사진 선택하고 시작!</label>
        <input type="file" id="file-input" accept="image/*" multiple>
    </div>

    <div id="particle-container"></div>
    
    <div class="game-board" id="board">
        <span class="board-deco" style="top: 10%; left: 5%;">⭐</span>
        <span class="board-deco" style="bottom: 10%; right: 5%;">🎨</span>
        <span class="board-deco" style="top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem;">🧸</span>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title" style="color: var(--brand-red); font-size: 2rem;">게임 결과</h2>
            <p id="result-msg" style="font-size: 1.2rem; margin-bottom: 25px;"></p>
            <button class="btn" onclick="location.reload()">한 번 더 하기!</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const setupBox = document.getElementById('setup-box');
        const board = document.getElementById('board');
        const timerDisplay = document.getElementById('timer-display');
        const resultModal = document.getElementById('result-modal');
        const resultTitle = document.getElementById('result-title');
        const resultMsg = document.getElementById('result-msg');
        const particleContainer = document.getElementById('particle-container');
        const timerBtns = document.querySelectorAll('.timer-btn');

        let imageUrls = [];
        let flippedCards = [];
        let lockBoard = false;
        let matches = 0;
        let timeLeft = 180;
        let timerInterval;
        const totalPairs = 6;

        timerBtns.forEach(btn => {
            btn.onclick = () => {
                timerBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                timeLeft = parseInt(btn.dataset.time);
                updateTimerDisplay();
            };
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (type === 'clap') {
                for(let i=0; i<8; i++) {
                    setTimeout(() => {
                        const bufferSize = audioCtx.sampleRate * 0.12;
                        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
                        const noise = audioCtx.createBufferSource();
                        noise.buffer = buffer;
                        const filter = audioCtx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.value = 800 + (Math.random() * 600);
                        const gain = audioCtx.createGain();
                        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                        noise.start();
                    }, i * 60);
                }
            } else if (type === 'firework') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'flip') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        // 더 화려한 폭죽 시스템
        function createFirework(x, y) {
            const colors = ['#ff6b6b', '#ffd93d', '#4ade80', '#4cc9f0', '#a29bfe', '#fab1a0', '#fd79a8'];
            const count = 40; // 파티클 개수 증가
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // 크기 다양화
                const size = Math.random() * 8 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                // 초기 속도와 각도
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                
                particleContainer.appendChild(particle);
                
                let opacity = 1;
                let curX = x;
                let curY = y;
                const gravity = 0.15; // 중력 효과
                const friction = 0.96; // 공기 저항
                
                const animate = () => {
                    vx *= friction;
                    vy *= friction;
                    vy += gravity;
                    
                    curX += vx;
                    curY += vy;
                    opacity -= 0.015; // 서서히 사라짐
                    
                    particle.style.left = curX + 'px';
                    particle.style.top = curY + 'px';
                    particle.style.opacity = opacity;
                    particle.style.transform = `scale(${opacity})`;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }

        fileInput.onchange = (e) => {
            const files = e.target.files;
            if (files.length < 6) {
                alert("그림 사진을 6장 꼭 선택해주세요!");
                return;
            }
            imageUrls = [];
            let count = 0;
            for (let i = 0; i < totalPairs; i++) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imageUrls.push(ev.target.result);
                    count++;
                    if (count === totalPairs) startTimerAndGame();
                };
                reader.readAsDataURL(files[i]);
            }
        };

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function startTimerAndGame() {
            setupBox.style.display = 'none';
            board.style.display = 'grid';
            timerDisplay.style.display = 'block';
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame(false);
                }
            }, 1000);

            const deck = [...imageUrls, ...imageUrls];
            deck.sort(() => Math.random() - 0.5);

            deck.forEach(src => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back">🎈</div>
                        <div class="card-face card-front"><img src="${src}"></div>
                    </div>
                `;
                
                card.onclick = () => {
                    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched') || timeLeft <= 0) return;
                    playSfx('flip');
                    card.classList.add('flipped');
                    flippedCards.push(card);

                    if (flippedCards.length === 2) {
                        lockBoard = true;
                        const img1 = flippedCards[0].querySelector('img').src;
                        const img2 = flippedCards[1].querySelector('img').src;

                        if (img1 === img2) {
                            setTimeout(() => {
                                playSfx('firework');
                                playSfx('clap');
                                flippedCards.forEach(c => {
                                    c.classList.add('matched-animation');
                                    c.classList.add('matched');
                                    const rect = c.getBoundingClientRect();
                                    // 짝을 맞췄을 때 폭죽 실행
                                    createFirework(rect.left + rect.width / 2, rect.top + rect.height / 2);
                                });
                                matches++;
                                flippedCards = [];
                                lockBoard = false;
                                if (matches === totalPairs) endGame(true);
                            }, 500);
                        } else {
                            setTimeout(() => {
                                flippedCards.forEach(c => c.classList.remove('flipped'));
                                flippedCards = [];
                                lockBoard = false;
                            }, 1000);
                        }
                    }
                };
                board.appendChild(card);
            });
        }

        function endGame(isWin) {
            clearInterval(timerInterval);
            lockBoard = true;
            if (isWin) {
                resultTitle.textContent = "우와! 성공이에요! 🎉";
                resultMsg.textContent = "모든 그림의 짝을 완벽하게 찾았어요! 정말 대단해요!";
                playSfx('clap');
                // 승리 시 여러 번의 화려한 폭죽
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        playSfx('firework');
                        createFirework(
                            Math.random() * window.innerWidth, 
                            Math.random() * window.innerHeight * 0.7
                        );
                    }, i * 250);
                }
            } else {
                resultTitle.textContent = "시간이 다 됐어요! ⏰";
                resultMsg.textContent = "조금만 더 빠르면 할 수 있을 거예요! 다시 해볼까요?";
            }
            resultModal.style.display = 'flex';
        }
    </script>
</body>
</html>
